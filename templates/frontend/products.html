{% extends 'frontend/base.html' %}
{% load static %}

{% block content %}
<!-- Page Header Start -->
    <div class="page-header bg-section parallaxie">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-12">
                    <!-- Page Header Box Start -->
                    <div class="page-header-box">
                        <h1 class="text-anime-style-3" data-cursor="-opaque">Our projects</h1>
                        <nav class="wow fadeInUp">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="{% url 'home' %}">home</a></li>
                                <li class="breadcrumb-item active" aria-current="page">our projects</li>
                            </ol>
                        </nav>
                    </div>
                    <!-- Page Header Box End -->
                </div>
            </div>
        </div>
    </div>
    <!-- Page Header End -->

    <!-- Page Projects Start -->
    <div class="page-projects">
        <div class="container">
            <div class="row project-item-list">
                {% for category in categories %}
                <div class="col-xl-3 col-md-6">
                    <!-- Project Item Start -->
                    <div class="project-item wow fadeInUp" data-wow-delay="{% cycle '0.1s' '0.3s' '0.5s' '0.7s' %}">
                        <!-- Project image Start -->
                        <div class="project-image">
                            <figure class="image-anime">
                                <img src="{% if category.image %}{{ category.image.url }}{% else %}{% static 'images/project-1.jpg' %}{% endif %}" alt="{{ category.name }}">
                            </figure>
                        </div>
                        <!-- Project image End -->

                        <!-- Project Button Start -->
                        <div class="project-btn">
                            <a href="{% url 'category_products' category.slug %}">
                                <img src="{% static 'images/arrow-white.svg' %}" alt="">
                            </a>
                        </div>
                        <!-- Project Button End -->

                        <!-- Project Content Start -->
                        <div class="project-content">
                            <h3><a href="{% url 'category_products' category.slug %}">{{ category.name }}</a></h3>
                            <p>{{ category.description|truncatechars:80 }}</p>
                        </div>
                        <!-- Project Content End -->
                    </div>
                    <!-- Project Item End -->
                </div>
                {% empty %}
                <p class="text-center w-100">No categories found.</p>
                {% endfor %}
            </div>
        </div>
    </div>
    <!-- Page Projects End -->
{% endblock %}
