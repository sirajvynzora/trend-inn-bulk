{% extends 'frontend/base.html' %}
{% load static %}

{% block content %}
<!-- Page Header Start -->
    <div class="page-header bg-section parallaxie">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-12">
                    <!-- Page Header Box Start -->
                    <div class="page-header-box">
                        <h1 class="text-anime-style-3" data-cursor="-opaque">Our blog</h1>
                        <nav class="wow fadeInUp">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="{% url 'home' %}">home</a></li>
                                <li class="breadcrumb-item active" aria-current="page">our blog</li>
                            </ol>
                        </nav>
                    </div>
                    <!-- Page Header Box End -->
                </div>
            </div>
        </div>
    </div>
    <!-- Page Header End -->

    <!-- Page Blog Start -->
    <div class="page-blog">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <!-- Post Item List Start -->
                    <div class="post-item-list">
{% for blog in blogs %}
                        <div class="post-item wow fadeInUp">
                            <div class="post-featured-image">
                                <a href="{% url 'blog_single_slug' blog.slug %}" data-cursor-text="View">
                                    <figure class="image-anime">
                                        {% if blog.image %}
                                            <img src="{{ blog.image.url }}" alt="{{ blog.title }}">
                                        {% else %}
                                            <img src="{% static 'images/post-1.jpg' %}" alt="{{ blog.title }}">
                                        {% endif %}
                                    </figure>
                                </a>
                                <div class="post-item-tags">
                                    <a href="{% url 'blog_single_slug' blog.slug %}">Blog</a>
                                </div>
                            </div>
                            <div class="post-item-body">
                                <div class="post-item-content">
                                    <h2><a href="{% url 'blog_single_slug' blog.slug %}">{{ blog.title }}</a></h2>
                                </div>
                                <div class="post-item-btn">
                                    <a href="{% url 'blog_single_slug' blog.slug %}" class="readmore-btn">read more</a>
                                </div>
                            </div>
                        </div>
{% empty %}
<p>No blogs yet.</p>
{% endfor %}
                    </div>
                    <!-- Post Item List End -->
                </div>

                <div class="col-lg-12">
                    <!-- Page Pagination Start -->
                    <div class="page-pagination wow fadeInUp" data-wow-delay="1s">
                        <ul class="pagination">
                            <li><a href="#"><i class="fa-solid fa-angle-left"></i></a></li>
                            <li class="active"><a href="#">1</a></li>
                            <li><a href="#">2</a></li>
                            <li><a href="#">3</a></li>
                            <li><a href="#"><i class="fa-solid fa-angle-right"></i></a></li>
                        </ul>
                    </div>
                    <!-- Page Pagination End -->
                </div>
            </div>
        </div>
    </div>
    <!-- Page Blog End -->
{% endblock %}
